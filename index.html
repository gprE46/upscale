<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upscaler Local WebGPU</title>
    <!-- Tailwind CSS para diseño móvil impecable -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-xl">
        <h1 class="text-xl font-bold mb-2 text-center">Upscaler IA Local (iPhone 15)</h1>
        <p class="text-xs text-zinc-400 mb-4 text-center">Procesamiento 100% local en tu dispositivo mediante WebGPU. Sin servidores ni costes.</p>

        <!-- Selector de archivos múltiple -->
        <div class="mb-4">
            <label class="block w-full text-center bg-blue-600 hover:bg-blue-500 active:scale-95 transition font-medium py-3 px-4 rounded-xl cursor-pointer text-sm shadow-lg">
                Seleccionar Capturas
                <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            </label>
        </div>

        <!-- Estado del Sistema -->
        <div id="statusBox" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 mb-4 text-xs text-zinc-300">
            <span id="statusText" class="font-mono text-yellow-400">Estado: Esperando imágenes...</span>
            <div class="w-full bg-zinc-800 h-2 rounded-full mt-2 overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Contenedor de Resultados -->
        <div id="resultsContainer" class="space-y-3 max-h-80 overflow-y-auto pr-1"></div>
    </div>

    <script>
        // CONFIGURACIÓN DEL MODELO ONNX
        // Nota: Reemplaza esta URL por un modelo .onnx ligero de superresolución (ej. Real-ESRGAN x2 o x4 optimizado para WebGPU)
        const MODEL_URL = 'https://huggingface.co/Xenova/real-esrgan-x2plus/resolve/main/onnx/model_fp16.onnx';

        let ortSession = null;
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const resultsContainer = document.getElementById('resultsContainer');

        // Inicializar el modelo al cargar la página
        async function initAI() {
            try {
                if (!navigator.gpu) {
                    throw new Error("WebGPU no está soportado en este navegador.");
                }

                statusText.textContent = "Estado: Cargando modelo de IA en GPU...";
                
                // Configurar ONNX Runtime para usar WebGPU prioritario
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
                
                ortSession = await ort.InferenceSession.create(MODEL_URL, {
                    executionProviders: ['webgpu', 'wasm'],
                    graphOptimizationLevel: 'all'
                });

                statusText.textContent = "Estado: Listo. Selecciona tus fotos.";
                statusText.className = "font-mono text-emerald-400";
            } catch (err) {
                console.error(err);
                statusText.textContent = "Error al cargar IA: " + err.message;
                statusText.className = "font-mono text-red-400";
            }
        }

        initAI();

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0 || !ortSession) return;

            resultsContainer.innerHTML = '';
            let processedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const progressPercent = ((i) / files.length) * 100;
                progressBar.style.width = `${progressPercent}%`;
                statusText.textContent = `Procesando (${i + 1}/${files.length}): ${file.name}`;

                try {
                    // 1. Cargar imagen de forma segura en memoria
                    const imgBitmap = await createImageBitmap(file);
                    
                    // Límite de seguridad de tamaño para evitar OOM (Out Of Memory) en Safari móvil
                    const maxDim = 800; 
                    let w = imgBitmap.width;
                    let h = imgBitmap.height;
                    if (w > maxDim || h > maxDim) {
                        const scale = maxDim / Math.max(w, h);
                        w = Math.round(w * scale);
                        h = Math.round(h * scale);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(imgBitmap, 0, 0, w, h);
                    
                    const imgData = ctx.getImageData(0, 0, w, h);
                    
                    // 2. Convertir ImageData a Tensor de entrada [1, 3, H, W] normalizado
                    const { data, width, height } = imgData;
                    const inputTensor = preprocessToTensor(data, width, height);

                    // 3. Inferencia mediante WebGPU
                    const feeds = { [ortSession.inputNames[0]]: inputTensor };
                    const results = await ortSession.run(feeds);
                    const outputTensor = results[ortSession.outputNames[0]];

                    // 4. Convertir tensor de salida de vuelta a imagen en Canvas
                    const outputCanvas = postprocessToTensor(outputTensor);

                    // 5. Renderizar tarjeta de resultado individual con botón de descarga
                    appendResultCard(file.name, outputCanvas.toDataURL('image/png'));

                    // Limpieza profunda de tensores para evitar fugas de memoria en la GPU
                    inputTensor.dispose();
                    outputTensor.dispose();

                } catch (err) {
                    console.error(`Error procesando ${file.name}:`, err);
                    appendErrorCard(file.name, err.message);
                }

                processedCount++;
            }

            progressBar.style.width = '100%';
            statusText.textContent = `¡Proceso completado! (${processedCount} imágenes)`;
            fileInput.value = ''; // Resetear input
        });

        // Funciones auxiliares de pre y post procesamiento matemático de tensores
        function preprocessToTensor(data, width, height) {
            const floatData = new Float32Array(3 * width * height);
            for (let i = 0; i < width * height; i++) {
                // Normalización típica RGB [0, 1] separada por canales
                floatData[i] = data[i * 4] / 255.0;                     // R
                floatData[width * height + i] = data[i * 4 + 1] / 255.0; // G
                floatData[2 * width * height + i] = data[i * 4 + 2] / 255.0; // B
            }
            return new ort.Tensor('float32', floatData, [1, 3, height, width]);
        }

        function postprocessToTensor(tensor) {
            const dims = tensor.dims; // [1, 3, H, W] o similar según modelo
            const height = dims[2];
            const width = dims[3];
            const tensorData = tensor.data;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(width, height);
            const d = imgData.data;

            for (let i = 0; i < width * height; i++) {
                const r = Math.min(Math.max(tensorData[i] * 255, 0), 255);
                const g = Math.min(Math.max(tensorData[width * height + i] * 255, 0), 255);
                const b = Math.min(Math.max(tensorData[2 * width * height + i] * 255, 0), 255);

                d[i * 4] = r;
                d[i * 4 + 1] = g;
                d[i * 4 + 2] = b;
                d[i * 4 + 3] = 255; // Alpha opaco
            }

            ctx.putImageData(imgData, 0, 0);
            return canvas;
        }

        function appendResultCard(filename, dataUrl) {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-zinc-950 p-2.5 rounded-xl border border-zinc-800 text-xs";
            div.innerHTML = `
                <div class="flex items-center space-x-3 overflow-hidden">
                    <img src="${dataUrl}" class="w-10 h-10 object-cover rounded-lg border border-zinc-700 flex-shrink-0">
                    <span class="truncate text-zinc-300">${filename}</span>
                </div>
                <a href="${dataUrl}" download="upscaled_${filename}" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-3 py-1.5 rounded-lg flex-shrink-0 ml-2 transition">Descargar</a>
            `;
            resultsContainer.appendChild(div);
        }

        function appendErrorCard(filename, errorMsg) {
            const div = document.createElement('div');
            div.className = "bg-red-950/40 border border-red-900/50 p-2.5 rounded-xl text-xs text-red-300";
            div.textContent = `Error en ${filename}: ${errorMsg}`;
            resultsContainer.appendChild(div);
        }
    </script>
</body>
</html>
